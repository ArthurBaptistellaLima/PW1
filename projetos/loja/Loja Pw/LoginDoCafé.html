<!DOCTYPE html>
<html lange="pt-br">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cafétecLogin</title>
    <link rel="stylesheet" href="stylesLogin.css">
    <link rel="icon" href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'
rel='stylesheet'>

     <link rel="icon" href="https://lh3.googleusercontent.com/d/1700G1UwXl2UGhbUADdwuiGDa_tZFVGmf">
     <link rel="stylesheet" href="styleslogin.css">
    </head>
    <body>
        <div class="wrapper">
            <from action="">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="Usuario" required>
                    <i class="bx bxs-user"></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Senha" required>
                    <i class="bx bxs-lock-alt"></i>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox">Lembre de mim</label>
                    <a href="#">Esqueceu sua Senha?</a>
                </div>
                <button type="submit" class="btn">login</button>
                <div class="Registrar senha">
                    <p>Não Tem Conta? <a href="#">Registrar</a></p>
                </div>
            </from>
        </div>
    </body>
</html>
